services:

  db:
    image: postgres:15
    container_name: coupon-db
    restart: always
    environment:
      POSTGRES_DB: coupons
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  app:
    build: .
    container_name: coupon-app
    depends_on:
      - db
    ports:
      - "8080:8080"